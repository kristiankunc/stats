name: Build Multi-Platform

on:
    push:
        branches:
            - main

jobs:
    build:
        strategy:
            matrix:
                include:
                    # Windows
                    - os: windows-latest
                      target: windows_amd64
                      artifact-name: stats-windows-x86.exe
                      output: stats.exe

                    # Linux
                    - os: ubuntu-latest
                      target: linux_amd64
                      artifact-name: stats-linux-x86
                      output: stats

                    # macOS
                    - os: macos-latest
                      target: darwin_amd64
                      artifact-name: stats-macos-x86
                      output: stats
                    - os: macos-latest
                      target: darwin_arm64
                      artifact-name: stats-macos-arm
                      output: stats

        runs-on: ${{ matrix.os }}

        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v6

            - name: Install Odin
              uses: laytan/setup-odin@v2
              with:
                  release: dev-2026-03

            - name: Build for ${{ matrix.target }}
              run: odin build stats -target:${{ matrix.target }}
              working-directory: .

            - name: Debug - List files
              run: |
                  if [ -f stats ]; then echo "Found: stats"; fi
                  if [ -f stats.exe ]; then echo "Found: stats.exe"; fi
                  if [ -f stats.bin ]; then echo "Found: stats.bin"; fi
                  ls -la | grep -E "(stats|\.exe|\.bin)" || echo "No matching files found"
              shell: bash

            - name: Test Windows binary
              if: matrix.os == 'windows-latest'
              run: |
                  .\stats.exe help
                  .\stats.exe version
                  .\stats.exe example.stat
              continue-on-error: true

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.artifact-name }}
                  path: ${{ matrix.output }}
